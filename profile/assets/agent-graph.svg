<svg viewBox="0 0 1730 1120" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B4B4B4"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3457D5"/>
    </marker>
  </defs>

  <rect width="1730" height="1120" fill="#ffffff"/>
  <text x="50" y="60" font-size="40" font-weight="700" fill="#0E0E10">Multi-Agent Orchestration Graph</text>
  <text x="52" y="92" font-size="18" font-family="Courier New, monospace" fill="#70707A">hub-and-spoke · the Supervisor is a deterministic router that makes 0 LLM calls</text>

  <!-- spoke lines (under boxes) -->
  <g stroke="#B4B4B4" stroke-width="2.5">
    <line x1="680" y1="560" x2="440" y2="570" marker-end="url(#g)" marker-start="url(#g)"/>
    <line x1="705" y1="480" x2="445" y2="300" marker-end="url(#g)" marker-start="url(#g)"/>
    <line x1="705" y1="655" x2="445" y2="840" marker-end="url(#g)" marker-start="url(#g)"/>
    <line x1="860" y1="470" x2="860" y2="272" marker-end="url(#g)" marker-start="url(#g)"/>
    <line x1="860" y1="665" x2="860" y2="878" marker-end="url(#g)" marker-start="url(#g)"/>
    <line x1="1035" y1="495" x2="1288" y2="415" marker-end="url(#g)" marker-start="url(#g)"/>
    <line x1="1035" y1="640" x2="1288" y2="725" marker-end="url(#g)" marker-start="url(#g)"/>
  </g>

  <!-- reflexion loop Generator <-> Validator -->
  <line x1="1480" y1="452" x2="1480" y2="688" stroke="#3457D5" stroke-width="3.5" marker-end="url(#b)" marker-start="url(#b)"/>
  <text x="1500" y="560" font-size="16" font-family="Courier New, monospace" font-weight="700" fill="#3457D5">reflexion:</text>
  <text x="1500" y="582" font-size="16" font-family="Courier New, monospace" font-weight="700" fill="#3457D5">retry on</text>
  <text x="1500" y="604" font-size="16" font-family="Courier New, monospace" font-weight="700" fill="#3457D5">lint errors</text>

  <!-- ===== SUPERVISOR (center) ===== -->
  <rect x="680" y="470" width="360" height="190" rx="18" fill="#0E0E10"/>
  <text x="860" y="545" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">SUPERVISOR</text>
  <text x="860" y="580" text-anchor="middle" font-size="17" font-family="Courier New, monospace" fill="#C9CDD8">deterministic router</text>
  <rect x="742" y="600" width="236" height="34" rx="17" fill="#1F9D5B"/>
  <text x="860" y="623" text-anchor="middle" font-size="16" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">0 LLM calls</text>

  <!-- ===== Planner (LLM) ===== -->
  <rect x="60" y="180" width="385" height="130" rx="14" fill="#EEF1FC" stroke="#3457D5" stroke-width="1.8"/>
  <rect x="355" y="196" width="74" height="30" rx="15" fill="#3457D5"/>
  <text x="392" y="217" text-anchor="middle" font-size="15" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">LLM</text>
  <text x="84" y="252" font-size="26" font-weight="700" fill="#0E0E10">Planner</text>
  <text x="84" y="284" font-size="15" font-family="Courier New, monospace" fill="#5B6472">drafts the high-level plan</text>

  <!-- ===== Analyzer (LLM) ===== -->
  <rect x="60" y="505" width="385" height="130" rx="14" fill="#EEF1FC" stroke="#3457D5" stroke-width="1.8"/>
  <rect x="355" y="521" width="74" height="30" rx="15" fill="#3457D5"/>
  <text x="392" y="542" text-anchor="middle" font-size="15" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">LLM</text>
  <text x="84" y="577" font-size="26" font-weight="700" fill="#0E0E10">Analyzer</text>
  <text x="84" y="609" font-size="15" font-family="Courier New, monospace" fill="#5B6472">ReAct · reads your real repo</text>

  <!-- ===== Researcher (LLM) ===== -->
  <rect x="60" y="830" width="385" height="130" rx="14" fill="#EEF1FC" stroke="#3457D5" stroke-width="1.8"/>
  <rect x="355" y="846" width="74" height="30" rx="15" fill="#3457D5"/>
  <text x="392" y="867" text-anchor="middle" font-size="15" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">LLM</text>
  <text x="84" y="902" font-size="26" font-weight="700" fill="#0E0E10">Researcher</text>
  <text x="84" y="934" font-size="15" font-family="Courier New, monospace" fill="#5B6472">ReAct · live web search</text>

  <!-- ===== Human-in-the-Loop (0 LLM) ===== -->
  <rect x="670" y="150" width="380" height="122" rx="14" fill="#E3F5E6" stroke="#3F9142" stroke-width="1.8"/>
  <rect x="962" y="166" width="76" height="30" rx="15" fill="#1F9D5B"/>
  <text x="1000" y="187" text-anchor="middle" font-size="14" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">0 LLM</text>
  <text x="694" y="222" font-size="24" font-weight="700" fill="#0E0E10">Human-in-the-Loop</text>
  <text x="694" y="252" font-size="15" font-family="Courier New, monospace" fill="#3F7A42">permission / clarification gate</text>

  <!-- ===== Writer (0 LLM) ===== -->
  <rect x="670" y="878" width="380" height="122" rx="14" fill="#E3F5E6" stroke="#3F9142" stroke-width="1.8"/>
  <rect x="962" y="894" width="76" height="30" rx="15" fill="#1F9D5B"/>
  <text x="1000" y="915" text-anchor="middle" font-size="14" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">0 LLM</text>
  <text x="694" y="950" font-size="24" font-weight="700" fill="#0E0E10">Writer</text>
  <text x="694" y="980" font-size="15" font-family="Courier New, monospace" fill="#3F7A42">saves the approved workflow file</text>

  <!-- ===== Generator (LLM) ===== -->
  <rect x="1290" y="320" width="380" height="130" rx="14" fill="#EEF1FC" stroke="#3457D5" stroke-width="1.8"/>
  <rect x="1582" y="336" width="74" height="30" rx="15" fill="#3457D5"/>
  <text x="1619" y="357" text-anchor="middle" font-size="15" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">LLM</text>
  <text x="1314" y="392" font-size="26" font-weight="700" fill="#0E0E10">Generator</text>
  <text x="1314" y="424" font-size="15" font-family="Courier New, monospace" fill="#5B6472">emits the pipeline YAML</text>

  <!-- ===== Validator (0 LLM) ===== -->
  <rect x="1290" y="690" width="380" height="130" rx="14" fill="#E3F5E6" stroke="#3F9142" stroke-width="1.8"/>
  <rect x="1580" y="706" width="76" height="30" rx="15" fill="#1F9D5B"/>
  <text x="1618" y="727" text-anchor="middle" font-size="14" font-family="Courier New, monospace" font-weight="700" fill="#ffffff">0 LLM</text>
  <text x="1314" y="762" font-size="26" font-weight="700" fill="#0E0E10">Validator</text>
  <text x="1314" y="794" font-size="15" font-family="Courier New, monospace" fill="#3F7A42">real linters: actionlint / GitLab</text>

  <text x="865" y="1075" text-anchor="middle" font-size="17" font-family="Courier New, monospace" fill="#70707A">Green nodes run zero LLM calls; only blue nodes call a model, and their output is always checked before it moves on.</text>
</svg>
